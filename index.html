<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haven</title>
    <script>
      // Applied synchronously, before first paint, to avoid a flash of the wrong theme.
      // Reconciled against the SQLite settings table (source of truth) once the DB loads.
      (function () {
        var cached = localStorage.getItem("haven-theme");
        var theme =
          cached === "light" || cached === "dark"
            ? cached
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
