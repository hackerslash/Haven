name: CI

# Builds and tests Colloquium on native macOS and Windows runners for
# every push/PR, so platform-specific regressions (e.g. a backend only
# compiled in for some OSes) are caught before a release build.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Frontend tests
        run: pnpm test

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test
